name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Lint client
        run: npm run lint:client

      - name: Lint server
        run: npm run lint:server

      - name: Build server
        run: npm run build:server

      - name: Build client
        run: npm run build:client

  deploy-server:
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Build server
        run: npm run build:server

      - name: Copy templates to dist
        run: cp -r server/src/templates server/dist/templates

      - name: Prune dev dependencies
        run: npm --prefix server prune --production

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ziplyserver-gthvgkhwbjghcxgc
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./server
          startup-command: node dist/index.js
